name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src
      - run: pytest --cov=evidenceagent_mm --cov-report=term-missing --cov-report=xml
      - run: python -m build
